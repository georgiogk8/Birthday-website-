<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1366, initial-scale=1.0">
<title>Happy Birthday with Perfect Zoomed Photo</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Cairo:wght@600;700&family=Caveat:wght@700&display=swap" rel="stylesheet">

<style>
/* --- الأنماط الأساسية --- */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Baloo 2', sans-serif;
}

body{
    background:#f6f8fc;
    overflow:hidden;
}

/* الصفحة كاملة */
.container{
    width:1366px;
    height:768px;
    margin:auto;
    position:relative;
    background:white;
    overflow:hidden;
}

/* --- نظام القياس التلقائي للشاشات الكبيرة واللاب توب --- */
@media (min-width: 1024px) {
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    .container {
        transform: scale(min(calc(100vw / 1366), calc(100vh / 768)));
        transform-origin: center center;
        margin: 0;
        flex-shrink: 0;
    }
}

/* --- عناصر الخلفية الزخرفية --- */
.circle{
    position:absolute;
    border-radius:50%;
    z-index:0;
}

.c1{
    width:300px;
    height:300px;
    background:#DBEAFE;
    top:-120px;
    right:-100px;
}

.c2{
    width:220px;
    height:220px;
    background:#E0F2FE;
    bottom:-80px;
    left:-60px;
}

/* --- 1. أنميشن الزينة المنحنية --- */
.paper-garland {
    position: absolute;
    top: -150px; 
    width: 380px;
    height: 150px;
    pointer-events: none;
    animation: dropGarland 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

.garland-left {
    left: 20px;
    transform: rotate(-5deg);
}

.garland-right {
    right: 20px;
    transform: rotate(5deg) scaleX(-1);
}

/* حاوية الزينة */
.decor-container {
    position: absolute;
    width: 100%;
    height: 100%;
    top: -100%; 
    left: 0;
    pointer-events: none; 
    animation: dropDecor 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.1) 0.2s forwards;
}

@keyframes dropGarland {
    to { top: -10px; }
}

@keyframes dropDecor {
    to { top: 0; }
}

/* أنميشن طفو البالونات والعناصر */
.icon-3d {
    position: absolute;
    filter: drop-shadow(0px 8px 15px rgba(30, 58, 138, 0.15));
}

@keyframes float {
    0%, 100% { transform: translateY(0px) rotate(-8deg); }
    50% { transform: translateY(-10px) rotate(-4deg); }
}

@keyframes float-silver {
    0%, 100% { transform: translateY(0px) rotate(12deg); }
    50% { transform: translateY(-10px) rotate(16deg); }
}

.balloon-blue-3d {
    font-size: clamp(50px, 6vw, 85px);
    background: radial-gradient(circle at 35% 35%, #a2d5f2 0%, #38BDF8 60%, #1E3A8A 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    top: 10%; 
    left: 45%; 
    animation: float 4s ease-in-out infinite;
}

.balloon-silver-3d {
    font-size: clamp(45px, 5vw, 80px);
    background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 50%, #64748b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    top: 20%; 
    left: 52%; 
    animation: float-silver 4.5s ease-in-out infinite;
}

.star-crystal-blue {
    font-size: 45px;
    background: radial-gradient(circle at 30% 30%, rgba(56, 189, 248, 1) 0%, rgba(37, 99, 235, 0.8) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.star-crystal-gold {
    font-size: 40px;
    background: linear-gradient(135deg, #ffd700 0%, #ff9800 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* --- كود الوجه والعيون الأصلي الخاص بك --- */
@keyframes float-smiley {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(5deg); }
}

.custom-smiley-container {
    position: absolute;
    top: 58%; 
    left: 48%;
    animation: float-smiley 5s ease-in-out infinite;
    filter: drop-shadow(0px 8px 15px rgba(30, 58, 138, 0.15));
}

.smiley-face {
    width: 65px;
    height: 65px;
    background-color: #f3e8f2;
    border: 2.5px solid #3c2a3d;
    border-radius: 50%;
    position: relative;
    box-sizing: border-box;
    display: block; 
}

.eyes {
    position: absolute;
    top: -150px; 
    left: 75%;
    transform: translateX(-50%);
    width: 195px; 
    font-family: sans-serif
}

.eye {
    width: 7px;   
    height: 14px; 
    background-color: #3c2a3d;
    border-radius: 50%;
}

.eye.left { 
    transform: rotate(-8deg); 
}

.eye.right { 
    transform: rotate(8deg); 
}

.mouth {
    width: 32px;
    height: 16px;
    border-bottom: 3px solid #3c2a3d;
    border-radius: 0 0 25px 25px;
    position: absolute;
    top: 36px; 
    left: 50%;
    transform: translateX(-50%);
}

/* --- 2. الجزء الأيسر --- */
.left {
    position: absolute;
    left: 90px;
    top: 160px; 
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.title {
    line-height: 0.95;
    font-size: 105px;
    font-weight: 800;
    color: #1E3A8A;
    display: block;
    position: relative; 
    text-align: left; 
    width: 100%;
}

.char {
    display: inline-block;
    opacity: 0;
    transform: scale(0.3) translateY(50px);
    text-shadow: 2px 4px 10px rgba(30, 58, 138, 0.3); 
    animation: letterAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    position: relative;
    z-index: 25; 
}

.title span .char {
    color: #38BDF8;
}

@keyframes letterAppear {
    to {
        opacity: 1;
        transform: scale(1) translateY(0);
    }
}

/* --- قبعة عيد الميلاد والتجويف الداخلي --- */
.hat-cavity {
    position: absolute;
    left: 280px; 
    width: 60px;
    height: 10px;
    background: #3D2314; 
    border-radius: 50%;
    z-index: 15; 
    pointer-events: none;
    top: -650px;
    animation: dropAndTiltCavity 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards 2s;
}

.birthday-hat {
    position: absolute;
    top: -650px; 
    left: 280px; 
    width: 60px;  
    height: 80px; 
    z-index: 35; 
    pointer-events: none;
    transform-origin: bottom center;
    animation: dropAndTiltHat 1.4s cubic-bezier(0.25, 1, 0.5, 1) forwards 2s;
}

.hat-cone {
    width: 0;
    height: 0;
    border-left: 30px solid transparent;  
    border-right: 30px solid transparent; 
    border-bottom: 65px solid #2563EB;   
    position: absolute;
    bottom: 0;
    left: 0;
}

.hat-cone::before {
    content: '';
    position: absolute;
    top: 0;
    left: -30px; 
    width: 60px;  
    height: 65px; 
    background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 10px,
        rgba(253, 224, 71, 0.8) 10px,
        rgba(253, 224, 71, 0.8) 20px
    );
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
}

.hat-cone::after {
    content: '';
    position: absolute;
    top: 0;
    left: -30px;
    width: 60px;
    height: 65px;
    background: linear-gradient(90deg, rgba(255,255,255,0.35) 0%, transparent 40%, rgba(0,0,0,0.25) 100%);
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
}

.hat-pompon {
    width: 16px;
    height: 16px;
    background: radial-gradient(circle at 35% 35%, #ffffff 0%, #fef08a 50%, #facc15 100%);
    border-radius: 50%;
    position: absolute;
    top: -5px;
    left: 22px;
    box-shadow: 0 0 10px rgba(254, 240, 138, 0.8);
}

@keyframes dropAndTiltHat {
    0% { top: -650px; transform: rotate(0deg); }
    70% { top: -65px; transform: rotate(-10deg); }
    85% { top: -50px; transform: rotate(35deg); }
    100% { top: -56px; transform: rotate(30deg); }
}

@keyframes dropAndTiltCavity {
    0% { top: -574px; transform: rotate(0deg); }
    70% { top: 11px; transform: rotate(-10deg); }
    85% { top: 26px; transform: rotate(35deg); }
    100% { top: 19px; transform: rotate(30deg); }
}

/* النص الأسفل */
.question-text {
    margin-top: 30px;
    font-size: 32px;
    font-weight: 700;
    color: #1E3A8A;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.6s ease forwards 2.4s; 
    text-align: center; 
    width: 100%; 
}

/* --- 3. منطقة الأزرار المحدثة (Glassmorphism & Glow) --- */
.buttons-wrapper {
    margin-top: 25px;
    display: flex;
    align-items: center;
    justify-content: center; 
    gap: 25px; 
    width: 100%; 
}

.animate-item {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeInUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

.btn-link {
    text-decoration: none;
}

/* تصميم الزر الزجاجي الفخم */
.btn-yes {
    border: 2px solid rgba(37, 99, 235, 0.2); 
    padding: 14px 55px;
    border-radius: 40px;
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    background: rgba(37, 99, 235, 0.08); 
    color: #2563EB; 
    backdrop-filter: blur(8px); 
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 8px 20px rgba(37, 99, 235, 0.05);
    display: inline-block;
    position: relative;
    overflow: hidden;
}

/* تأثير التمرير (Hover) وإضاءة النيون النظيفة */
.btn-yes:hover { 
    background: #2563EB; 
    color: white; 
    border-color: #2563EB;
    transform: translateY(-5px); 
    box-shadow: 0 12px 28px rgba(37, 99, 235, 0.35), 0 0 15px rgba(37, 99, 235, 0.2); 
}

.or-text {
    font-family: 'Caveat', cursive;
    font-size: 34px;
    color: #64748b;
    user-select: none;
    pointer-events: none; 
    display: inline-block;
}

@keyframes fadeInUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* --- 4. الجزء الأيمن (الصورة) --- */
.right {
    position: absolute;
    right: 120px;
    top: 160px; 
    text-align: center;
    z-index: 10;
}

.profile-wrapper {
    position: relative;
    display: inline-block; 
    filter: drop-shadow(0px 15px 25px rgba(96,165,250, 0.45)); 
    opacity: 0;
    transform: translateY(600px) scale(0.7); 
    animation: frameRise 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards 1s; 
}

.profile-wrapper img {
    width: 450px; 
    height: auto;
    display: block;
}

@keyframes frameRise {
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="circle c1"></div>
    <div class="circle c2"></div>

    <svg class="paper-garland garland-left" viewBox="0 0 100 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,5 Q50,35 100,5" stroke="#CBD5E1" stroke-width="0.8" fill="none" stroke-dasharray="2,2"/>
        <polygon points="10,8 18,8 14,22" fill="#2563EB" />
        <polygon points="25,12 33,12 29,26" fill="#38BDF8" />
        <polygon points="40,14 48,14 44,28" fill="#FBBF24" />
        <polygon points="55,14 63,14 59,28" fill="#60A5FA" />
        <polygon points="70,12 78,12 74,26" fill="#2563EB" />
        <polygon points="85,8 93,8 89,22" fill="#38BDF8" />
    </svg>

    <svg class="paper-garland garland-right" viewBox="0 0 100 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,5 Q50,35 100,5" stroke="#CBD5E1" stroke-width="0.8" fill="none" stroke-dasharray="2,2"/>
        <polygon points="10,8 18,8 14,22" fill="#2563EB" />
        <polygon points="25,12 33,12 29,26" fill="#38BDF8" />
        <polygon points="40,14 48,14 44,28" fill="#FBBF24" />
        <polygon points="55,14 63,14 59,28" fill="#60A5FA" />
        <polygon points="70,12 78,12 74,26" fill="#2563EB" />
        <polygon points="85,8 93,8 89,22" fill="#38BDF8" />
    </svg>

    <div class="decor-container">
        <div class="icon-3d balloon-blue-3d">🎈</div>
        <div class="icon-3d balloon-silver-3d">🎈</div>
        <div class="icon-3d star-crystal-blue" style="top:220px; left:40px;">✦</div>
        <div class="icon-3d star-crystal-gold" style="top:110px; left:35%;">★</div>
        <div class="icon-3d star-crystal-gold" style="bottom:120px; left:40px;">★</div>
        <div class="icon-3d star-crystal-blue" style="top:40%; right:40px;">✦</div>
        <div class="icon-3d star-crystal-blue" style="bottom:40px; right:35%;">★</div>
        
        <div class="custom-smiley-container">
            <div class="smiley-face">
                <div class="eyes">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                </div>
                <div class="mouth"></div>
            </div>
        </div>
    </div>

    <div class="left">
        <h1 class="title">
            <span class="char" style="animation-delay: 0.5s;">H</span><span class="char" style="animation-delay: 0.6s;">A</span><span class="char" style="animation-delay: 0.7s;">P</span><span class="char" style="animation-delay: 0.8s;">P</span><span class="char" style="animation-delay: 0.9s;">Y</span><br>
            
            <span>
                <span class="char" style="animation-delay: 1.1s;">B</span><span class="char" style="animation-delay: 1.2s;">I</span><span class="char" style="animation-delay: 1.3s;">R</span><span class="char" style="animation-delay: 1.4s;">T</span><span class="char" style="animation-delay: 1.5s;">H</span><span class="char" style="animation-delay: 1.6s;">D</span><span class="char" style="animation-delay: 1.7s;">A</span><span class="char" style="animation-delay: 1.8s;">Y</span>
            </span>

            <div class="hat-cavity"></div>

            <div class="birthday-hat">
                <div class="hat-pompon"></div>
                <div class="hat-cone"></div>
            </div>
        </h1>
        
        <div class="question-text">
            Are you ready to begin the day?
        </div>
        
        <div class="buttons-wrapper">
            <div class="animate-item" style="animation-delay: 2.8s;">
                <a href="next.html" class="btn-link">
                    <button class="btn-yes">Yes</button>
                </a>
            </div>
            
            <div class="animate-item" style="animation-delay: 3.0s;">
                <span class="or-text">or</span>
            </div>
            
            <div class="animate-item" style="animation-delay: 3.2s;">
                <a href="next.html" class="btn-link">
                    <button class="btn-yes">Yes</button>
                </a>
            </div>
        </div>
    </div>

    <div class="right">
        <div class="profile-wrapper">
            <img src="images/Picsart_26-06-19_21-16-05-136.png" alt="Birthday">
        </div>
    </div>

</div>

</body>
</html>
